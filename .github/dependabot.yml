# Dependabot configuration
# Docs: https://docs.github.com/en/code-security/dependabot

version: 2

registries:
  github-packages:
    type: npm-registry
    url: https://npm.pkg.github.com
    token: ${{ secrets.GH_PACKAGES_TOKEN }}

updates:
  # Enable version updates for npm/pnpm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "America/Detroit"
    registries:
      - github-packages
    open-pull-requests-limit: 10
    groups:
      admin-package:
        patterns:
          - "@jessepomeroy/admin"
      crm-api-package:
        patterns:
          - "@jessepomeroy/crm-api"
      minor-and-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"

  # Also check GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "America/Detroit"
