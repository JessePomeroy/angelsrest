name: Auto-merge Dependabot PRs

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' && !github.event.pull_request.draft
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      # Always auto-merge internal shared packages. These releases are already
      # validated by their source repo CI before publishing, and this command
      # waits for this repo's required checks before merging.
      - name: Auto-merge admin package updates
        if: |
          contains(steps.metadata.outputs.dependency-names, '@jessepomeroy/admin') ||
          contains(steps.metadata.outputs.dependency-names, '@jessepomeroy/crm-api')
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Auto-merge minor and patch updates for everything else
      - name: Auto-merge minor and patch updates
        if: |
          !contains(steps.metadata.outputs.dependency-names, '@jessepomeroy/admin') &&
          !contains(steps.metadata.outputs.dependency-names, '@jessepomeroy/crm-api') &&
          (steps.metadata.outputs.update-type == 'version-update:semver-minor' || steps.metadata.outputs.update-type == 'version-update:semver-patch')
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
