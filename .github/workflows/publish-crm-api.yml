name: Publish @jessepomeroy/crm-api

# When the generated Convex API surface changes on main, auto-bump the patch
# version of packages/crm-api and publish to GitHub Packages. Spoke sites
# (reflecting-pool et al.) consume the package; this keeps them in sync without
# any manual version wrangling.
#
# Trigger guard: we diff convex/_generated/api.d.ts against the parent commit
# and exit early if unchanged. Bump commits only touch packages/crm-api/
# package.json, so they don't re-trigger publish.

on:
  push:
    branches: [main]
    paths:
      - "convex/_generated/api.d.ts"

# Only one publish run at a time — back-to-back schema changes should serialize.
concurrency:
  group: publish-crm-api
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the parent commit to diff against.
          fetch-depth: 2
          # Use a token that can push the bump commit back to main.
          token: ${{ secrets.PUBLISH_TOKEN }}

      - name: Check for api.d.ts hash change
        id: diff
        run: |
          CURR_HASH=$(git hash-object convex/_generated/api.d.ts)
          PREV_HASH=$(git show HEAD~1:convex/_generated/api.d.ts | git hash-object --stdin || echo "none")
          echo "current=${CURR_HASH}" >> "$GITHUB_OUTPUT"
          echo "previous=${PREV_HASH}" >> "$GITHUB_OUTPUT"
          if [ "${CURR_HASH}" = "${PREV_HASH}" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "api.d.ts unchanged (${CURR_HASH}); skipping."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "api.d.ts changed (${PREV_HASH} -> ${CURR_HASH}); will publish."
          fi

      - uses: pnpm/action-setup@v4
        if: steps.diff.outputs.changed == 'true'
        with:
          version: 10

      - uses: actions/setup-node@v4
        if: steps.diff.outputs.changed == 'true'
        with:
          node-version: 22
          registry-url: "https://npm.pkg.github.com"
          cache: pnpm

      - name: Install dependencies
        if: steps.diff.outputs.changed == 'true'
        run: pnpm install --frozen-lockfile
        env:
          NPM_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Bump patch version
        if: steps.diff.outputs.changed == 'true'
        id: bump
        working-directory: packages/crm-api
        run: |
          NEW_VERSION=$(pnpm version patch --no-git-tag-version | tr -d '\n')
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumped to ${NEW_VERSION}"

      - name: Build package (syncs convex/ + tsc)
        if: steps.diff.outputs.changed == 'true'
        working-directory: packages/crm-api
        run: pnpm sync-convex && pnpm build

      - name: Publish to GitHub Packages
        if: steps.diff.outputs.changed == 'true'
        working-directory: packages/crm-api
        run: pnpm publish --no-git-checks
        env:
          NPM_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}

      - name: Commit version bump back to main
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/crm-api/package.json
          git commit -m "chore(crm-api): bump to ${{ steps.bump.outputs.version }} [skip ci]"
          git push origin HEAD:main
