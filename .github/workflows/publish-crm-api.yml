name: Publish @jessepomeroy/crm-api

# Changesets-driven release workflow. Two-state machine:
#
# 1. Pending changesets exist on main (developer ran `pnpm changeset add`
#    and pushed the resulting `.changeset/*.md` file). The action opens
#    or updates a release PR titled "chore(crm-api): version packages"
#    that consumes the pending changesets, bumps the version, and updates
#    CHANGELOG.md. Reviewer merges when ready.
#
# 2. The release PR was just merged. No pending `.changeset/*.md` files
#    remain. The action runs `pnpm changeset publish`, which iterates
#    packages whose published registry version doesn't match local and
#    publishes them to GitHub Packages.
#
# Replaces the previous hash-diff trigger (which violated semver — every
# api.d.ts change was a patch bump) and the manual `pnpm version patch`
# logic. See gap-2-crm-api-first-publish-spec.md Phase 3 for context.
#
# Auth: uses the auto-injected `secrets.GITHUB_TOKEN` for everything
# (open the version-PR, push commits, publish to GitHub Packages). The
# workflow-level `permissions:` block grants the scopes it needs.
# The standard "GITHUB_TOKEN can't trigger downstream workflows" caveat
# doesn't apply here — the version-PR is merged by a human, and the
# resulting merge-commit push triggers the publish run normally. No
# PAT required.

on:
  workflow_dispatch:
  push:
    branches: [main]

# Only one publish run at a time — back-to-back schema changes serialize.
concurrency:
  group: publish-crm-api
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need history so changesets/action can compute version diffs.
          fetch-depth: 0
          # GITHUB_TOKEN is sufficient — see header comment.
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://npm.pkg.github.com"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NPM_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish
          # NB: do NOT include `[skip ci]` here. It propagates into the
          # squash-merge commit on main and suppresses this workflow's
          # publish run (the second half of the two-state machine), which
          # bit us on the 1.0.0 publish — had to dispatch manually. The
          # cost of letting CI re-run on the version-PR's bump commits is
          # a few extra runs per release; cheaper than human ops.
          commit: "chore(crm-api): version packages"
          title: "chore(crm-api): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
