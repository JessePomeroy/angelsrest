name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Audit H43: cancel in-progress runs for the same ref when a newer push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  ci:
    runs-on: ubuntu-latest
    # Job-level env: every step inherits these placeholders. Both the
    # type-check and the test suite reference `$env/static/public.*` /
    # `process.env.*` at module-load time; without these set, modules
    # like adminAuth.ts (which reads PUBLIC_CONVEX_URL) throw
    # "Auth backend not configured" before any test mocks can intercept.
    # Locally these values come from `.env.local`; CI gets the same shape
    # via this block so tests + type-check run against identical inputs.
    env:
      STRIPE_SECRET_KEY: placeholder
      STRIPE_WEBHOOK_SECRET: placeholder
      STRIPE_PLATFORM_WEBHOOK_SECRET: placeholder
      RESEND_API_KEY: placeholder
      PUBLIC_SITE_URL: https://www.angelsrest.online
      PUBLIC_STRIPE_PUBLIC_KEY: placeholder
      PUBLIC_SANITY_PROJECT_ID: placeholder
      PUBLIC_SANITY_DATASET: production
      PUBLIC_CONVEX_URL: https://placeholder.convex.cloud
      GALLERY_WORKER_URL: placeholder
      GALLERY_ADMIN_SECRET: placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # STOPGAP (2026-04-25): angelsrest's package.json has
      # `"@jessepomeroy/admin": "link:../admin-dashboard"`. On the runner the
      # sibling directory doesn't exist, so pnpm creates a dead symlink and
      # svelte-check then fails with 27 "Cannot find module '@jessepomeroy/
      # admin'" errors. Clone + build the sibling here so the link resolves.
      # Goes away when Admin Phase 1 (subtree merge into packages/admin/)
      # lands per migration-execution-order.md Day 4. The repo is public, so
      # no token is needed for the clone. Corepack auto-switches to the
      # pnpm version pinned in admin-dashboard's package.json, which also
      # avoids any pnpm 10 vs 9 lockfile drama.
      - name: Clone + build admin-dashboard sibling for link dep
        run: |
          git clone --depth 1 https://github.com/JessePomeroy/admin-dashboard.git "$RUNNER_WORKSPACE/admin-dashboard"
          cd "$RUNNER_WORKSPACE/admin-dashboard"
          pnpm install --frozen-lockfile
          pnpm build
        env:
          # admin-dashboard's .npmrc references ${NPM_TOKEN}; nothing in its
          # dep tree actually needs auth (no @jessepomeroy/* deps), but pnpm
          # warns loudly if the var is unset. Pass the token so logs stay
          # quiet.
          NPM_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - run: pnpm install --frozen-lockfile
        env:
          NPM_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      # Audit H50: match the local `pnpm lint` command (biome check .) so CI
      # and local linting agree on scope. Previously CI scanned only src/,
      # which meant scripts/ and convex/ lint errors slipped through.
      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm check

      # Audit H41: run the full vitest suite on every PR / push so regressions
      # land in the status check, not in production.
      - name: Tests
        run: pnpm test
