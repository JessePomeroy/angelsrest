name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        env:
          NPM_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Lint
        run: pnpm biome check src/

      - name: Type check
        env:
          STRIPE_SECRET_KEY: placeholder
          STRIPE_WEBHOOK_SECRET: placeholder
          STRIPE_PLATFORM_WEBHOOK_SECRET: placeholder
          RESEND_API_KEY: placeholder
          PUBLIC_SITE_URL: https://www.angelsrest.online
          PUBLIC_STRIPE_PUBLIC_KEY: placeholder
          PUBLIC_SANITY_PROJECT_ID: placeholder
          PUBLIC_SANITY_DATASET: production
          PUBLIC_CONVEX_URL: https://placeholder.convex.cloud
          GALLERY_WORKER_URL: placeholder
          GALLERY_ADMIN_SECRET: placeholder
        run: npx svelte-kit sync && npx svelte-check --threshold error
