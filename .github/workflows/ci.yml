name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Audit H43: cancel in-progress runs for the same ref when a newer push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  ci:
    runs-on: ubuntu-latest
    # Job-level env: every step inherits these placeholders. Both the
    # type-check and the test suite reference `$env/static/public.*` /
    # `process.env.*` at module-load time; without these set, modules
    # like adminAuth.ts (which reads PUBLIC_CONVEX_URL) throw
    # "Auth backend not configured" before any test mocks can intercept.
    # Locally these values come from `.env.local`; CI gets the same shape
    # via this block so tests + type-check run against identical inputs.
    env:
      STRIPE_SECRET_KEY: placeholder
      STRIPE_WEBHOOK_SECRET: placeholder
      STRIPE_PLATFORM_WEBHOOK_SECRET: placeholder
      RESEND_API_KEY: placeholder
      PUBLIC_SITE_URL: https://www.angelsrest.online
      PUBLIC_STRIPE_PUBLIC_KEY: placeholder
      PUBLIC_SANITY_PROJECT_ID: placeholder
      PUBLIC_SANITY_DATASET: production
      PUBLIC_CONVEX_URL: https://placeholder.convex.cloud
      GALLERY_WORKER_URL: placeholder
      GALLERY_ADMIN_SECRET: placeholder
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          package-manager-cache: false
          registry-url: "https://npm.pkg.github.com"
          scope: "@jessepomeroy"
          token: ""

      - name: Enable reviewed pnpm
        run: |
          corepack enable
          corepack pnpm --version | grep -Fx '10.34.5'

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      # Audit H50: match the local `pnpm lint` command (biome check .) so CI
      # and local linting agree on scope. Previously CI scanned only src/,
      # which meant scripts/ and convex/ lint errors slipped through.
      - name: Lint
        run: pnpm lint

      - name: Type check
        run: |
          pnpm check
          pnpm --filter @jessepomeroy/gallery-delivery check
          pnpm --filter @jessepomeroy/print-catalog check

      # Audit H41: run the full vitest suite on every PR / push so regressions
      # land in the status check, not in production.
      - name: Tests
        run: |
          pnpm test
          pnpm --filter @jessepomeroy/gallery-delivery test
          pnpm --filter @jessepomeroy/print-catalog test

      - name: Retired platform checkout handler stays absent
        run: test ! -f src/routes/api/platform/create-checkout/+server.ts

      - name: Public server method dispatch smoke
        run: pnpm test:e2e tests/e2e/orders-lookup-api.spec.ts
